services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: ai_todo_clickhouse
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - IPC_LOCK
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: todos
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ai_todo_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  app-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: app-service
    environment:
      GRPC_PORT: "50051"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_DB: todos
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    expose:
      - "50051"
    depends_on:
      clickhouse:
        condition: service_healthy

  api-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api-service
    environment:
      PORT: "3001"
      APP_SERVICE_URL: "app-service:50051"
    ports:
      - "3001:3001"
    depends_on:
      - app-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: "http://localhost:3001"
    ports:
      - "5173:5173"
    depends_on:
      - api-service

volumes:
  ai_todo_clickhouse_data:
